<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | Aarohi</title>
    <meta name="description" content="Get help with Aarohi — contact our support team for bug reports, feature requests, or any questions about the app.">
    <meta name="theme-color" content="#08060f">
    <link rel="icon" type="image/png" href="assets/favicon.png?v=3">
    <link rel="apple-touch-icon" href="assets/favicon.png?v=3">
    <meta property="og:title" content="Support | Aarohi">
    <meta property="og:description" content="Our support team is here for you.">
    <meta property="og:image" content="assets/og-image.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <noscript><style>.reveal, .reveal-delay { opacity: 1 !important; transform: none !important; }</style></noscript>
</head>
<body>
    
    <div class="aura-background">
        <div class="aura-blob blob-1"></div>
        <div class="aura-blob blob-2"></div>
        <div class="aura-blob blob-3"></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo" style="text-decoration: none;">Aarohi</a>
            <a href="index.html#download" class="nav-cta">Get the App</a>
        </div>
    </nav>

    <div class="page-header reveal">
        <h1>How can we help?</h1>
        <p>Our support team is here for you.</p>
    </div>

    <div class="document-container support-container reveal-delay">
        <form class="support-form" action="mailto:kamakshiig21@gmail.com" method="post" enctype="text/plain">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" class="glass-input" placeholder="e.g. Kamakshi" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="glass-input" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="topic">How can we help?</label>
                <input type="text" id="topic" name="topic" class="glass-input" placeholder="e.g. Bug report, Feature request..." required>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" class="glass-input" placeholder="Please describe your issue in detail..." required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Send Message</button>
        </form>

        <div class="support-email-direct">
            <p>Or email us directly at <br> <a href="mailto:kamakshiig21@gmail.com">kamakshiig21@gmail.com</a></p>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="logo">Aarohi</div>
            <p>&copy; 2026 Kamakshi Gupta. All rights reserved.</p>
            <div class="footer-links">
                <a href="privacy.html">Privacy Policy</a>
                <a href="terms.html">Terms of Service</a>
                <a href="support.html">Support</a>
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
